<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trendora – Discover the latest fashion trends. Shop clothing for men, women, and kids with great deals." />
  <meta name="keywords" content="fashion, clothing, ecommerce, men, women, kids, trendora, online shop" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#fbfbfc" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f0f11" media="(prefers-color-scheme: dark)" />

  <!-- Open Graph -->
  <meta property="og:title" content="Trendora – Fashion Store" />
  <meta property="og:description" content="Discover the latest fashion trends at Trendora. Shop clothing for men, women, and kids." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://trendora.store/og-image.jpg" />
  <meta property="og:url" content="https://trendora.store" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Trendora – Fashion Store" />
  <meta name="twitter:description" content="Discover the latest fashion trends at Trendora." />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="./css/output.css" />
  <link rel="shortcut icon" href="./assets/images/logo.jpg" type="image/x-icon" />
  <link rel="apple-touch-icon" href="./assets/images/logo.jpg" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" defer></script>

  <title>Trendora Store – Fashion for Everyone</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Store",
    "name": "Trendora",
    "description": "Discover the latest fashion trends at Trendora. Shop clothing for men, women, and kids.",
    "url": "https://trendora.store",
    "logo": "https://trendora.store/assets/images/logo.jpg",
    "sameAs": [
      "https://facebook.com/trendora",
      "https://instagram.com/trendora"
    ]
  }
  </script>
</head>

<body>
  <a href="#content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[9999] focus:px-4 focus:py-2 focus:bg-(--onbg) focus:text-(--bg) focus:rounded-lg focus:outline-none">
    Skip to main content
  </a>

  <div id="toast-container" class="fixed top-5 left-0 right-0 mx-auto z-50 space-y-3 w-11/12 max-w-md pointer-events-none" role="status" aria-live="polite"></div>

  <header id="header"></header>

  <main id="content"></main>

  <div id="chatbot"></div>

  <footer id="footer"></footer>

  <!-- Back to top button -->
  <button id="back-to-top" aria-label="Back to top"
    class="fixed bottom-6 left-6 w-12 h-12 rounded-full bg-(--onbg) text-(--bg) shadow-lg flex items-center justify-center opacity-0 invisible translate-y-4 transition-all duration-300 z-40 hover:scale-110 active:scale-95">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script type="module" src="./js/main.js"></script>
</body>

</html>

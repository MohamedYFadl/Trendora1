<div class="shadow-lg mx-auto md:px-4 fixed w-full bg-(--bg) top-0 z-50 animate-top px-1" role="banner">
  <div class="flex h-16 items-center justify-between">
    <div class="flex items-center md:gap-4 gap-2">
      <button class="md:hidden text-xl" id="burgerIcon" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="mobile-menu">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>

      <a href="#home" class="text-xl font-bold uppercase font-(family-name:--fsecond)" aria-label="Trendora Home">
        Trendora
      </a>

      <nav class="hidden md:flex items-center gap-2 text-sm lg:text-base lg:gap-6" aria-label="Main navigation">
        <a class="nav-link" href="#products" aria-current="page">Shop</a>
        <a class="nav-link" href="#top-selling">On Sale</a>
        <a class="nav-link" href="#products?gender=men">Men</a>
        <a class="nav-link" href="#products?gender=women">Women</a>
        <a class="nav-link" href="#products?gender=kids">Kids</a>
      </nav>
    </div>

    <div class="flex items-center md:gap-2 gap-1">
      <form id="search-form" class="hidden md:block relative group" role="search" aria-label="Search products">
        <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 opacity-40 group-focus-within:opacity-100 transition-opacity" aria-hidden="true"></i>
        <input type="search"
          class="bg-(--bgsecond) text-(--onbg) rounded-full py-2 pl-4 pr-10 outline-none border border-transparent focus:border-(--onbg)/20 transition-all w-48 lg:w-64"
          id="search-input" autocomplete="off" placeholder="Search products..." aria-label="Search products" />
        <div id="search-results" class="bg-(--bgsecond) text-(--onbg) absolute w-full z-50 rounded-xl mt-1 hidden" role="listbox" aria-label="Search results"></div>
      </form>

      <button id="theme-toggle"
        class="p-2.5 rounded-full bg-(--bgsecond) text-(--onbg) active:scale-90 transition hover:bg-(--onbg) hover:text-(--bg)"
        aria-label="Toggle theme">
        <span id="sun-icon" class="hidden text-sm" aria-hidden="true">☀️</span>
        <span id="moon-icon" class="text-sm" aria-hidden="true">🌙</span>
      </button>

      <a href="#cart" class="p-2.5 rounded-full hover:bg-(--bgsecond) transition text-lg relative" aria-label="Shopping cart">
        <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
      </a>

      <div id="auth-buttons"></div>
    </div>
  </div>
</div>

<div id="mobile-menu"
  class="md:hidden origin-top scale-y-0 opacity-0 fixed left-0 right-0 top-16 z-40 transition-all duration-300 ease-out bg-(--bg) border-b border-(--onbg) shadow-xl"
  role="navigation" aria-label="Mobile navigation">
  <nav class="flex flex-col gap-2 p-4">
    <a class="mobile-link text-lg font-medium" href="#products">Shop</a>
    <a class="mobile-link text-lg font-medium" href="#top-selling">On Sale</a>
    <a class="mobile-link text-lg font-medium" href="#new-arrival">New Arrivals</a>
    <a class="mobile-link text-lg font-medium" href="#cart">Cart</a>

    <div class="relative mt-4">
      <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 opacity-40" aria-hidden="true"></i>
      <input type="search" placeholder="Search..." id="mobile-search-input"
        class="w-full p-3 pl-10 rounded-xl bg-(--bgsecond) text-(--onbg) outline-none border border-transparent focus:border-(--onbg)/20"
        aria-label="Search products" />
      <div id="mobile-search-results" class="bg-(--bgsecond) text-(--onbg) absolute w-full z-50 rounded-xl mt-1 left-0 hidden" role="listbox" aria-label="Search results"></div>
    </div>
  </nav>
</div>
